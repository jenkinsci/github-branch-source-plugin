page.description=Find your GitHub App ID and private key on <a href="https://github.com" target="_alt">GitHub</a> under Settings / Developer Settings / GitHub Apps / (Your app) / About.
appID.name=GitHub App ID
appID.description=For example, 123456.
privateKey.name=Private key
privateKey.description=GitHub will generate your private key in PKCS#1 format, it must be in PKCS#8 format.<br/>You can convert it with: <code>openssl pkcs8 -topk8 -nocrypt -in downloaded-key.pem</code>

